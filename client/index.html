  <script>
  let token = null;
  let selectedUser = null; // Ensure this is defined first
  let currentProfiles = [];
    let currentUsers = [];
  const socket = io('http://localhost:5000'); // Ensure Socket.IO is initialized correctly

    function setAuthView(isLoggedIn) {
        document.body.classList.toggle('auth-view', !isLoggedIn);

        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const dashboard = document.getElementById('dashboard');
        const authOnlyButtons = [
            document.getElementById('add-profile-button'),
            document.getElementById('logout-button'),
            document.getElementById('chats-button'),
            document.getElementById('chat-toggle-button'),
        ];
        const actionRail = document.getElementById('action-rail');
        const chatModal = document.getElementById('chat-modal');
        const chatPanel = document.getElementById('chat');
        const addProfileModal = document.getElementById('add-profile-modal');

        if (loginSection) {
            loginSection.style.display = isLoggedIn ? 'none' : 'block';
            if (!isLoggedIn) {
                loginSection.classList.remove('hidden');
            }
        }

        if (signupSection) {
            signupSection.classList.add('hidden');
            signupSection.classList.remove('fade-in', 'fade-out');
            signupSection.style.display = 'none';
        }

        if (dashboard) {
            dashboard.style.display = isLoggedIn ? 'block' : 'none';
        }

        authOnlyButtons.forEach((button) => {
            if (!button) return;
            button.style.display = isLoggedIn ? 'flex' : 'none';
        });

        if (actionRail) {
            actionRail.style.display = isLoggedIn ? 'flex' : 'none';
            if (!isLoggedIn) {
                actionRail.classList.remove('is-expanded');
            }
        }

        if (!isLoggedIn) {
            if (chatModal) chatModal.style.display = 'none';
            if (chatPanel) {
                chatPanel.style.display = 'none';
                chatPanel.classList.add('hidden');
                chatPanel.classList.remove('collapsed');
            }
            if (addProfileModal) addProfileModal.style.display = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        setupSocketListeners();
        setAuthView(false);
    });

  // Listen for incoming messages
  




async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('http://localhost:5000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Failed to log in');

        // Save token and switch UI to dashboard
        token = data.token;
        setAuthView(true);
       

        const userId = getUserIdFromToken(token);

        // Join room and fetch users
        socket.emit('join_room', userId);
        console.log(`User ${userId} joined room ${userId}`);
       
        // Fetch posts after successful login
        // await fetchPosts();
        //fetch profiles after successful login 
        await fetchProfiles();
        await fetchUsers();

        // Reinitialize WebSocket listeners
        setupSocketListeners();

    } catch (error) {
        console.error('Login error:', error);
        alert(error.message || 'Login failed.');
    }
}

function setupSocketListeners() {
    socket.off('receive_message'); // Remove existing listeners first
    socket.off('user_logged_in');
    socket.off('user_logged_out');
    socket.off('users_updated');

    socket.on('user_logged_in', ({ userId }) => {
        console.log(`User ${userId} logged in`);
        updateUserStatusIndicator(userId, true);
    });

    socket.on('receive_message', (message) => {
    console.log('Message received:', message);

    const incomingSenderId = normalizeObjectId(message?.senderId);
    const activeSelectedUserId = normalizeObjectId(selectedUser?._id);

    if (!incomingSenderId || !activeSelectedUserId || incomingSenderId !== activeSelectedUserId) {
        return;
    }

    const chatMessages = document.getElementById('chat-messages-container');
    if (!chatMessages) {
        return;
    }

    const messageElement = document.createElement('div');
    messageElement.classList.add('chat-bubble', 'received');
    messageElement.innerText = message.content;

    chatMessages.appendChild(messageElement);
    chatMessages.scrollTop = chatMessages.scrollHeight;
});


    socket.on('user_logged_out', ({ userId }) => {
        console.log(`User ${userId} logged out`);

        updateUserStatusIndicator(userId, false);

        if (selectedUser && selectedUser._id === userId) {
            const chatModal = document.getElementById('chat-modal');
            chatModal.style.display = 'none';
            const chatMessages = document.getElementById('modal-chat-messages');
            chatMessages.innerHTML = '';
            selectedUser = null;
            closeChat();
        }
    });

    socket.on('users_updated', (users) => {
        currentUsers = Array.isArray(users) ? users : [];
        renderUsersModal(currentUsers);
    });
}

   

    async function logout() {
    try {
        const userId = getUserIdFromToken(token);

        const response = await fetch('http://localhost:5000/logout', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ userId }),
        });

        if (!response.ok) throw new Error('Failed to log out');

        // Reset UI
        token = null;
        setAuthView(false);
        // document.getElementById('open-users-modal').style.display = 'none';

 
        closeChatModal();

        selectedUser = null;

        alert('You have been logged out.');
    } catch (error) {
        console.error('Logout error:', error);
        alert(error.message || 'Logout failed.');
    }
}

    function getUserIdFromToken(token) {
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.id;
    }
    async function signup() {
        const username = document.getElementById('signup-username').value;
        const password = document.getElementById('signup-password').value;
        const role = 'user';
        const fullName = document.getElementById('signup-full-name').value.trim();
        const dateOfBirth = document.getElementById('signup-dob').value;
        const interest = document.getElementById('signup-interest').value;
        const email = document.getElementById('signup-email').value.trim();
        const contactNumber = document.getElementById('signup-contact-number').value.trim();

        if (!fullName || !dateOfBirth || !interest || !email || !contactNumber) {
            alert('Please fill in name, date of birth, interest, email, and contact number.');
            return;
        }

        const payload = { username, password, role };
        payload.fullName = fullName;
        payload.dateOfBirth = dateOfBirth;
        payload.interest = interest;
        payload.email = email;
        payload.contactNumber = contactNumber;

        const response = await fetch('http://localhost:5000/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (response.ok) {
            alert(data.message);
            toggleSignupForm(); // Hide the signup form after successful signup
        } else {
            alert(data.message || 'Error signing up');
        }
        }

    function toggleSignupForm() {
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');

        if (!loginSection || !signupSection) return;

        if (signupSection.classList.contains('hidden')) {
            signupSection.style.display = 'block';
            loginSection.style.display = 'none';
            signupSection.classList.remove('hidden');
            signupSection.classList.remove('fade-out');
            signupSection.classList.add('fade-in');
            loginSection.classList.add('hidden');
            loginSection.classList.add('fade-out');
            loginSection.classList.remove('fade-in');
        } else {
            signupSection.classList.remove('fade-in');
            signupSection.classList.add('fade-out');

            loginSection.classList.remove('fade-out');
            loginSection.classList.remove('hidden');
            loginSection.classList.add('fade-in');
            loginSection.style.display = 'block';

            setTimeout(() => {
                signupSection.classList.add('hidden');
                signupSection.style.display = 'none';
                loginSection.classList.remove('hidden');
            }, 500); 
        }
    }


        async function fetchUsers() {
            try {
                const response = await fetch('http://localhost:5000/users', {
                    headers: { Authorization: `Bearer ${token}` },
                });

                if (!response.ok) throw new Error('Failed to fetch users');

                const users = await response.json();
                console.log('Fetched users:', users);
                currentUsers = Array.isArray(users) ? users : [];

            
                renderUsersModal(currentUsers); // Render for chat modal

            } catch (error) {
                console.error('Error fetching users:', error);
                alert('Could not load users. Please try again.');
            }
}



function renderUsersModal(users) {
    const usersList = document.getElementById('users-list');
    usersList.innerHTML = ''; // Clear the modal user list

    users.forEach(user => {
        const userItem = createUserElement(user);

        // Add event listener to open a chat with the user
        userItem.addEventListener('click', () => openChat(user));

        // Append the user to the users list in the modal
        usersList.appendChild(userItem);
    });
}

function updateUserStatusIndicator(userId, isOnline) {
    currentUsers = currentUsers.map((user) => (
        user._id === userId ? { ...user, isOnline } : user
    ));

    const userItem = document.querySelector(`#users-list .user-item[data-user-id="${userId}"]`);
    if (!userItem) {
        renderUsersModal(currentUsers);
        return;
    }

    userItem.classList.toggle('online', isOnline);
    userItem.classList.toggle('offline', !isOnline);

    const statusLabel = userItem.querySelector('.user-status-label');
    if (statusLabel) {
        statusLabel.textContent = isOnline ? 'Online' : 'Offline';
    }

    const statusDot = userItem.querySelector('.user-status-dot');
    if (statusDot) {
        statusDot.classList.toggle('online', isOnline);
        statusDot.classList.toggle('offline', !isOnline);
    }

    renderUsersModal(currentUsers);
}


async function createPost() {
    const category = document.getElementById('post-category').value;
    const content = document.getElementById('post-content').value;

    if (!category || !content) {
        alert('Both category and content are required');
        return;
    }

    try {
        console.log('JWT token being sent:', token); // Debugging: Ensure token is being sent

        const response = await fetch('http://localhost:5000/diary/post', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`, 
            },
            body: JSON.stringify({ category, content }),
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.message || 'Failed to create post');
        }

        const post = await response.json();
        alert('Post created successfully!');
        console.log('Created Post:', post);

        // Reload posts
        fetchPosts();
    } catch (error) {
        console.error('Error creating post:', error);
        alert('Failed to create post. Please try again.');
    }
}




async function fetchPosts() {
    try {
        const response = await fetch('http://localhost:5000/diary/posts', {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
            },
        });

        if (!response.ok) {
            throw new Error('Failed to fetch posts');
        }

        const posts = await response.json();
        console.log('Fetched posts:', posts);
        renderPosts(posts);
    } catch (error) {
        console.error('Error fetching posts:', error);
    }
}

// Function to toggle chat modal
function toggleChatModal() {
    const chatModal = document.getElementById('chat-modal');
    if (!chatModal) return;

    if (chatModal.classList.contains('is-open')) {
        closeUsers();
        return;
    }

    if (chatModal._closeTimer) {
        clearTimeout(chatModal._closeTimer);
        chatModal._closeTimer = null;
    }

    chatModal.style.display = 'block';
    requestAnimationFrame(() => {
        chatModal.classList.add('is-open');
    });
    fetchUsers(); 
}




function renderPosts(posts) {
    const postsList = document.getElementById('posts-list');
    postsList.innerHTML = ''; // Clear existing posts

    if (!posts || posts.length === 0) {
        postsList.innerHTML = '<p>No posts available.</p>';
        return;
    }

    posts.forEach((post) => {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        postElement.innerHTML = `
            <h4>${post.title}</h4>
            <p>${post.content}</p>
            <small>Category: ${post.category}</small>
            <small>Posted by: ${post.userId.username || 'Unknown'}</small>
            <hr />
        `;
        postsList.appendChild(postElement);
    });
}







function openUsersModal() {
    const usersModal = document.getElementById('chat-modal');
    if (!usersModal) return;

    if (usersModal._closeTimer) {
        clearTimeout(usersModal._closeTimer);
        usersModal._closeTimer = null;
    }

    usersModal.style.display = 'block';
    requestAnimationFrame(() => {
        usersModal.classList.add('is-open');
    });
    fetchUsers();
}

function closeUsers() {
    const usersModal = document.getElementById('chat-modal');
    if (!usersModal) return;

    usersModal.classList.remove('is-open');

    if (usersModal._closeTimer) {
        clearTimeout(usersModal._closeTimer);
    }

    usersModal._closeTimer = setTimeout(() => {
        usersModal.style.display = 'none';
        usersModal._closeTimer = null;
    }, 280);
}
function minimiseUsers() {
    const usersModal = document.getElementById('chat-modal');
    if (!usersModal) return;

    const minimiseButton = document.getElementById('minimise-users');
    const isCollapsed = usersModal.classList.toggle('collapsed');

    if (minimiseButton) {
        const icon = minimiseButton.querySelector('.window-icon');
        if (icon) {
            icon.classList.toggle('window-icon-minimize', !isCollapsed);
            icon.classList.toggle('window-icon-expand', isCollapsed);
        }
    }

    const collapseButton = document.getElementById('collapse-chat');
    if (collapseButton) {
        const icon = collapseButton.querySelector('.window-icon');
        if (icon) {
            icon.classList.toggle('window-icon-minimize', !isCollapsed);
            icon.classList.toggle('window-icon-expand', isCollapsed);
        }
    }
}



// Helper function to create a single user element
function createUserElement(user) {
  const userElement = document.createElement('div');
  userElement.className = 'user-item';
  userElement.dataset.userId = user._id; // Use data-* attribute for the user ID
    userElement.classList.add(user.isOnline ? 'online' : 'offline'); // Add a class for styling

    const nameSpan = document.createElement('span');
    nameSpan.className = 'user-item-name';
    nameSpan.textContent = user.username;

    const statusWrap = document.createElement('span');
    statusWrap.className = 'user-status';

    const statusDot = document.createElement('span');
    statusDot.className = `user-status-dot ${user.isOnline ? 'online' : 'offline'}`;

    const statusLabel = document.createElement('span');
    statusLabel.className = 'user-status-label';
    statusLabel.textContent = user.isOnline ? 'Online' : 'Offline';

    statusWrap.appendChild(statusDot);
    statusWrap.appendChild(statusLabel);

    userElement.appendChild(nameSpan);
    userElement.appendChild(statusWrap);

  userElement.addEventListener('click', () => selectUser(user)); // Add click event

  return userElement;
}


function selectUser(user) {
  selectedUser = user;
  console.log('Selected user:', selectedUser); // Confirm user selection
  const chatModal = document.getElementById('chat-modal');
  const chatUsername = document.getElementById('modal-chat-username');
  const chatMessages = document.getElementById('modal-chat-messages');

  chatUsername.innerText = `Chat with ${user.username}`;
  chatMessages.innerHTML = ''; // Clear previous messages
  chatModal.style.display = 'block';
  console.log('selectUSER  function called');
}

function updateChatHeaderName() {
    const userName = selectedUser?.username || 'No user selected';
    const chatUsername = document.getElementById('chat-username');
    const collapseUsername = document.getElementById('chat-collapse-username');

    if (chatUsername) {
        chatUsername.innerText = userName;

        collapseUsername.innerText = userName;

function openChat(user) {
    selectedUser = user; // Set the selected user for the chat
    console.log('Selected user for chat:', selectedUser);

    updateChatHeaderName();

    const chat = document.getElementById('chat');
    if (chat) {
        chat.style.display = 'block';
        chat.classList.remove('collapsed');
        chat.classList.remove('hidden');

    const collapseSummary = document.getElementById('chat-collapse-summary');

    }

        chatMessages.innerHTML = ''; // Clear previous messages
    }

    // Fetch and display chat history
    fetchChatHistory(user).then(() => {
        console.log('Chat history fetched.');
    }).catch(error => {
        console.error('Error fetching chat history:', error);
    });
    console.log('Chat history fetched.');

    // Show the chat modal
    const chatModal = document.getElementById('chat');

        chatModalContainer.style.display = 'block';
        chatModalContainer.classList.remove('hidden');
        console.log('Chat modal container opened.');
    } else {
        console.error('Chat modal container element is missing');
    }
}



async function fetchChatHistory(user) {
    try {
        const response = await fetch(`http://localhost:5000/messages/${user._id}`, {
            headers: {
                'Authorization': `Bearer ${token}`,
            },
        });

        if (!response.ok) {
            throw new Error('Failed to fetch chat history');
        }

        const messages = await response.json();
        const chatMessages = document.getElementById('chat-messages-container'); // Corrected ID
        chatMessages.innerHTML = ''; // Clear previous messages

        messages.forEach((message) => {
            const messageElement = document.createElement('div');
            messageElement.classList.add('chat-bubble');

            // Determine if the message is sent or received
            if (normalizeObjectId(message.sender) === normalizeObjectId(getUserIdFromToken(token))) {
                messageElement.classList.add('sent'); // Add 'sent' class for user's own messages
            } else {
                messageElement.classList.add('received'); // Add 'received' class for other messages
            }

            messageElement.innerText = message.content;
            chatMessages.appendChild(messageElement);
        });

        // Auto-scroll to the bottom of chat history
        chatMessages.scrollTop = chatMessages.scrollHeight;
    } catch (error) {
        console.error('Error fetching chat history:', error);
    }
}


function minimiseChat() {
    const chat = document.getElementById('chat');
    if (!chat) return;

    const minimiseButton = document.getElementById('minimise-chat');
    const collapseSummary = document.getElementById('chat-collapse-summary');
    const isCollapsed = chat.classList.toggle('collapsed');

    if (minimiseButton) {
        const icon = minimiseButton.querySelector('.window-icon');
        if (icon) {
            icon.classList.toggle('window-icon-minimize', !isCollapsed);
            icon.classList.toggle('window-icon-expand', isCollapsed);
        }
    }

    if (collapseSummary) {
        collapseSummary.classList.toggle('hidden', !isCollapsed);
    }

    updateChatHeaderName();
}


function closeChatModal() {
    const chatModal = document.getElementById('chat');
    const chatModalContainer = document.getElementById('chat-modal-container');
    const chatMessages = document.getElementById('chat-messages-container');
    const chatInput = document.getElementById('chat-input');

    if (chatModal) {
        chatModal.style.display = 'none';
        chatModal.classList.add('hidden');
        chatModal.classList.remove('collapsed');
    }

    if (collapseButton) {

      chatModalContainer.style.display = 'none';}else{

      }
    if(chatMessages){
      chatMessages.innerHTML = '';}else{
        console.error('Chat messages not found');
      }
    if(chatInput){

function toggleChat() {
    const chat = document.getElementById("chat");
    if (chat.classList.contains("hidden")) {
        chat.classList.remove("hidden");
    } else {
        chat.classList.add("hidden");
    }
}

async function sendChatMessage() {
    const chatInput = document.getElementById('chat-input');
    const messageContent = chatInput.value.trim();

    if (!selectedUser || !messageContent) {
        alert('Select a user and type a message.');
        return;
    }

    try {
        console.log('Sending message to:', selectedUser._id);  // Log receiver ID
        console.log('Message content:', messageContent);       // Log message content

        const response = await fetch('http://localhost:5000/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`, // Include JWT token
            },
            body: JSON.stringify({
                receiver: selectedUser._id, // Receiver's ID
                content: messageContent,   // Message content
            }),
        });

        const responseData = await response.json();

        if (!response.ok) {
            console.error('Error response:', responseData);
            throw new Error(responseData.message || 'Failed to send message');
        }

        console.log('Message saved:', responseData.data);

        // Add the message to the sender's chat window
        const chatMessages = document.getElementById('chat-messages-container');
        const messageElement = document.createElement('div');
        messageElement.classList.add('chat-bubble', 'sent');
        messageElement.innerText = messageContent;
        chatMessages.appendChild(messageElement);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        // Clear the input field
        chatInput.value = '';
        // Notify the chat button
        // notifyChatButton();
    } catch (error) {
        console.error('Error sending message:', error);
        alert('Failed to send message. Please try again.');
    }
}

function normalizeObjectId(value) {
    if (!value) return '';
    if (typeof value === 'object') {
        if (value.$oid) return String(value.$oid);
        if (value._id) return String(value._id);
    }
    return String(value);
}

async function fetchProfiles() {
    try {
        const response = await fetch('http://localhost:5000/profiles/profiles', {
            headers: { Authorization: `Bearer ${token}` },
        });

        if (!response.ok) throw new Error('Failed to fetch profiles');

        const profiles = await response.json();
        currentProfiles = Array.isArray(profiles) ? profiles : [];
        console.log('Fetched profiles:', currentProfiles); // Debug API response
        renderProfiles(currentProfiles);
    } catch (error) {
        console.error('Error fetching profiles:', error);
        alert('Failed to load profiles. Please try again.');
    }
}

function filterProfiles() {
    const filterInput = document.getElementById('profile-filter');
    const query = (filterInput?.value || '').toLowerCase().trim();

    if (!query) {
        renderProfiles(currentProfiles);
        return;
    }

    const filteredProfiles = currentProfiles.filter((profile) => {
        const searchableText = [
            profile.profileName,
            profile.description,
            profile.type,
        ].join(' ').toLowerCase();

        return searchableText.includes(query);
    });

    renderProfiles(filteredProfiles);
}

    const safeProfiles = Array.isArray(profiles) ? profiles : [];

    } else {

        const imageUrl = profile.imageUrl

            : 'default-placeholder.png'; // Default image if no profile picture

        const primaryButtonAction = profilePageUrl
            ? 'openProfilePageOverlayFromButton(this)'
            : 'expandProfile(this)';
        const overlayButtonMarkup = profilePageUrl
            ? `<button class="profile-overlay-open-button" onclick="openProfilePageOverlayFromButton(this)" data-overlay-url="${profilePageUrl}">Open ProdbyENNE</button>`

                fill="none"

                class="button__icon-svg"
                width="10"
                >
                <path
                    d="M13.376 11.552l-.264-10.44-10.44-.24.024 2.28 6.96-.048L.2 12.56l1.488 1.488 9.432-9.432-.048 6.912 2.304.024z"
                    fill="currentColor"
                ></path>
                </svg>

                <svg
                viewBox="0 0 14 15"
                fill="none"
                width="10"
                xmlns="http://www.w3.org/2000/svg"
                class="button__icon-svg button__icon-svg--copy"
                >
                <path
                    d="M13.376 11.552l-.264-10.44-10.44-.24.024 2.28 6.96-.048L.2 12.56l1.488 1.488 9.432-9.432-.048 6.912 2.304.024z"

function sanitizeProfilePageUrl(profilePageUrl) {
    if (!profilePageUrl || typeof profilePageUrl !== 'string') {
        return '';
    }

    const trimmedUrl = profilePageUrl.trim();
    if (!trimmedUrl) {
        return '';
    }

    const isAllowedUrl = trimmedUrl.startsWith('/') || trimmedUrl.startsWith('http://') || trimmedUrl.startsWith('https://');
    return isAllowedUrl ? trimmedUrl : '';
}

function resolveProfilePageUrl(profile) {
    const explicitUrl = sanitizeProfilePageUrl(profile?.profilePageUrl);
    if (explicitUrl) {
        return explicitUrl;
    }

    const normalizedName = (profile?.profileName || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    if (normalizedName.includes('prodby') && normalizedName.includes('enne')) {
        return '/profiles/prodbyenne/index.html';
    }

    return '';
}

function ensureProfilePageOverlay() {
    let overlay = document.getElementById('profile-page-overlay');
    if (overlay) return overlay;

    overlay = document.createElement('div');
    overlay.id = 'profile-page-overlay';
    overlay.className = 'profile-page-overlay';
    overlay.setAttribute('aria-hidden', 'true');
    overlay.innerHTML = `
        <div class="profile-page-overlay-backdrop" onclick="closeProfilePageOverlay()"></div>
        <div class="profile-page-overlay-window" role="dialog" aria-modal="false" aria-label="Embedded profile page">
            <div class="profile-page-overlay-header">
                <span class="profile-page-overlay-title">ProdbyENNE</span>
                <button class="profile-page-overlay-close" onclick="closeProfilePageOverlay()" aria-label="Close embedded page">Close</button>
            </div>
            <div class="profile-page-overlay-body is-loading">
                <div class="profile-page-overlay-loading" aria-hidden="true">
                    <span class="profile-page-overlay-spinner"></span>
                    <span class="profile-page-overlay-loading-text">Loading embedded page...</span>
                </div>
                <iframe
                    id="profile-page-overlay-iframe"
                    class="profile-page-overlay-iframe"
                    src="about:blank"
                    title="Embedded profile page viewer"
                    loading="lazy"
                    referrerpolicy="no-referrer"
                ></iframe>
            </div>
        </div>
    `;

    document.body.appendChild(overlay);
    return overlay;
}

function openProfilePageOverlayFromButton(button) {
    const overlayUrl = sanitizeProfilePageUrl(button?.dataset?.overlayUrl || '');
    if (!overlayUrl) {
        alert('No embedded page URL is configured for this profile yet.');
        return;
    }

    openProfilePageOverlay(overlayUrl);
}

function openProfilePageOverlay(profilePageUrl) {
    const safeUrl = sanitizeProfilePageUrl(profilePageUrl);
    if (!safeUrl) return;

    const overlay = ensureProfilePageOverlay();
    const overlayBody = overlay.querySelector('.profile-page-overlay-body');
    const iframe = overlay.querySelector('#profile-page-overlay-iframe');
    const loadingText = overlay.querySelector('.profile-page-overlay-loading-text');
    if (!overlayBody || !iframe) return;

    if (!iframe.dataset.loaderBound) {
        iframe.addEventListener('load', () => {
            if (iframe._overlayLoadTimeout) {
                clearTimeout(iframe._overlayLoadTimeout);
                iframe._overlayLoadTimeout = null;
            }
            overlayBody.classList.remove('is-loading');
            overlayBody.classList.remove('is-timeout');
            iframe.dataset.loaded = 'true';
        });
        iframe.dataset.loaderBound = 'true';
    }

    if (iframe._overlayLoadTimeout) {
        clearTimeout(iframe._overlayLoadTimeout);
        iframe._overlayLoadTimeout = null;
    }

    overlay.classList.add('is-open');
    overlay.setAttribute('aria-hidden', 'false');
    overlayBody.classList.add('is-loading');
    overlayBody.classList.remove('is-timeout');

    if (loadingText) {
        loadingText.textContent = 'Loading embedded page...';
    }

    iframe.dataset.loaded = 'false';
    iframe.src = safeUrl;

    iframe._overlayLoadTimeout = setTimeout(() => {
        if (iframe.dataset.loaded === 'true') return;
        overlayBody.classList.add('is-timeout');
        if (loadingText) {
            loadingText.textContent = 'This page is taking longer than expected. Check the URL and try reopening this overlay.';
        }
    }, 8000);
}

function closeProfilePageOverlay() {
    const overlay = document.getElementById('profile-page-overlay');
    if (!overlay) return;

    const overlayBody = overlay.querySelector('.profile-page-overlay-body');
    const iframe = overlay.querySelector('#profile-page-overlay-iframe');
    const loadingText = overlay.querySelector('.profile-page-overlay-loading-text');

    if (iframe && iframe._overlayLoadTimeout) {
        clearTimeout(iframe._overlayLoadTimeout);
        iframe._overlayLoadTimeout = null;
    }

    if (overlayBody) {
        overlayBody.classList.remove('is-loading');
        overlayBody.classList.remove('is-timeout');
    }

    if (loadingText) {
        loadingText.textContent = 'Loading embedded page...';
    }

    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden', 'true');
}

function updateExpandedProfileTitle(profile, isExpanded) {
    if (!profile) return;

    const titleElement = profile.querySelector('.profile-title');
    const baseName = profile.dataset.profileName || 'Profile';
    if (!titleElement) return;

    titleElement.textContent = baseName;
}


function expandProfile(button) {
    const profile = button.closest('.profile');
    if (!profile) return;

    ensureProfileOverlay();

    const shell = document.querySelector('.profile-view-shell');
    const profilesGrid = profile.closest('.profiles-grid');
    const details = profile.querySelector('.profile-details');
    const buttonText = button.querySelector('.button-text');
    const overlay = document.getElementById('profile-focus-overlay');

    if (!details) return;

    const isOpening = !profile.classList.contains('profile-expanded');

    // Keep one expanded profile active at a time.
    document.querySelectorAll('.profile.profile-expanded').forEach((openProfile) => {
        if (openProfile === profile) return;
        openProfile.classList.remove('profile-expanded');

        const openDetails = openProfile.querySelector('.profile-details');
        if (openDetails) {
            openDetails.classList.remove('visible');
        }

        const openButtonText = openProfile.querySelector('.button-text');
        if (openButtonText) {
            openButtonText.textContent = 'Open';
        }

        updateExpandedProfileTitle(openProfile, false);
    });

    profile.classList.toggle('profile-expanded', isOpening);
    details.classList.toggle('visible', isOpening);

    if (shell) {
        const hasExpanded = !!document.querySelector('.profile.profile-expanded');
        shell.classList.toggle('shell-expanded', hasExpanded);
    }

    if (profilesGrid) {
        const hasExpanded = !!profilesGrid.querySelector('.profile.profile-expanded');
        profilesGrid.classList.toggle('has-expanded-profile', hasExpanded);
    }

    if (overlay) {
        overlay.classList.toggle('active', !!document.querySelector('.profile.profile-expanded'));
    }

    document.body.classList.toggle('profile-focus-active', !!document.querySelector('.profile.profile-expanded'));

    if (buttonText) {
        buttonText.textContent = isOpening ? 'Close' : 'Open';
    }

    updateExpandedProfileTitle(profile, isOpening);
}

function minimizeExpandedProfile() {
    const expandedProfile = document.querySelector('.profile.profile-expanded');
    const overlay = document.getElementById('profile-focus-overlay');
    const shell = document.querySelector('.profile-view-shell');
    const profilesGrid = document.querySelector('#profiles-list .profiles-grid');

    if (!expandedProfile) return;

    expandedProfile.classList.remove('profile-expanded');
    const details = expandedProfile.querySelector('.profile-details');
    const buttonText = expandedProfile.querySelector('.button-text');

    if (details) {
        details.classList.remove('visible');
    }

    if (buttonText) {
        buttonText.textContent = 'Open';
    }

    updateExpandedProfileTitle(expandedProfile, false);

    if (overlay) {
        overlay.classList.remove('active');
    }

    if (shell) {
        shell.classList.remove('shell-expanded');
    }

    if (profilesGrid) {
        profilesGrid.classList.remove('has-expanded-profile');
    }

    document.body.classList.remove('profile-focus-active');
}

function ensureProfileOverlay() {
    let overlay = document.getElementById('profile-focus-overlay');
    if (overlay) return;

    const shell = document.querySelector('.profile-view-shell');
    if (!shell) return;

    overlay = document.createElement('div');
    overlay.id = 'profile-focus-overlay';
    overlay.className = 'profile-focus-overlay';
    overlay.addEventListener('click', minimizeExpandedProfile);
    shell.appendChild(overlay);
}

document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
        const pageOverlay = document.getElementById('profile-page-overlay');
        if (pageOverlay && pageOverlay.classList.contains('is-open')) {
            closeProfilePageOverlay();
            return;
        }
        minimizeExpandedProfile();
    }
});

// Sync scrollbar function to keep top and bottom scrollbars in sync
function syncScrollbars() {
    const syncScroller = document.getElementById('scrollbar-sync');
    const profileRing = document.getElementById('profiles-list');
    const profilesGrid = document.querySelector('#profiles-list .profiles-grid');
    
    if (!syncScroller || !profileRing || !profilesGrid) return;
    
    // Set the width of the sync scroller content to match the profiles grid
    const syncContent = syncScroller.querySelector('.scrollbar-sync-content') || document.createElement('div');
    syncContent.className = 'scrollbar-sync-content';
    syncContent.style.width = profilesGrid.scrollWidth + 'px';
    
    if (!syncScroller.contains(syncContent)) {
        syncScroller.innerHTML = '';
        syncScroller.appendChild(syncContent);
    }
    
    // Sync scroll events
    profileRing.addEventListener('scroll', () => {
        syncScroller.scrollLeft = profileRing.scrollLeft;
    });
    
    syncScroller.addEventListener('scroll', () => {
        profileRing.scrollLeft = syncScroller.scrollLeft;
    });
}

// Initialize scroll sync when page loads
document.addEventListener('DOMContentLoaded', syncScrollbars);


async function addProfile() {
    const profileName = document.getElementById('profile-name').value; // Use profileName instead of name
    const description = document.getElementById('profile-description').value;
    const type = document.getElementById('profile-type').value;
    const profilePageUrl = document.getElementById('profile-page-url')?.value?.trim() || '';
    const profilePictureInput = document.getElementById('profile-picture');
    const profilePicture = profilePictureInput.files[0];

    if (!profileName) {
        alert('Profile name is required');
        return;
    }

    const formData = new FormData();
    formData.append('profileName', profileName); // Use profileName
    formData.append('description', description);
    formData.append('type', type);
    formData.append('profilePageUrl', profilePageUrl);
    if (profilePicture) {
        formData.append('profilePicture', profilePicture);
    }

    try {
        const response = await fetch('http://localhost:5000/profiles/profiles', {
            method: 'POST',
            headers: {
                Authorization: `Bearer ${token}`,
            },
            body: formData, // Send as multipart form-data
        });

        if (!response.ok) throw new Error('Failed to create profile');

        alert('Profile added successfully');
        fetchProfiles(); // Reload profiles
    } catch (error) {
        console.error('Error adding profile:', error);
        alert('Failed to add profile. Please try again.');
    }
}
